<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Chi Tiết Sinh Viên</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .detail-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background-color: #f9f9f9; }
        .detail-card p { font-size: 16px; margin-bottom: 10px; }
        .detail-card strong { display: inline-block; width: 100px; }
        .actions { margin-top: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; margin-right: 10px; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-warning { background-color: #ffc107; color: black; }
        .btn-danger { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>Hồ Sơ Sinh Viên</h1>

    <div class="detail-card">
        <p><strong>MSSV:</strong> <span th:text="${student.id}"></span></p>
        <p><strong>Họ và Tên:</strong> <span th:text="${student.name}"></span></p>
        <p><strong>Email:</strong> <span th:text="${student.email}"></span></p>
        <p><strong>Tuổi:</strong> <span th:text="${student.age}"></span></p>
    </div>

    <div class="actions">
        <a th:href="@{/students}" class="btn btn-secondary">Quay lại danh sách</a>
        <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-warning">Chỉnh Sửa</a>
        
        <a th:href="@{/students/delete/{id}(id=${student.id})}" 
           class="btn btn-danger" 
           onclick="return confirm('Bạn có chắc chắn muốn xóa sinh viên này khỏi hệ thống không?');">
           Xóa
        </a>
    </div>
</body>
</html>
