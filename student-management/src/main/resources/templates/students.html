<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Danh Sách Sinh Viên</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        max-width: 800px;
        margin: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: left;
      }
      th {
        background-color: #f4f4f4;
      }
      .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .btn {
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      .btn-primary {
        background-color: #007bff;
        color: white;
      }
      .btn-info {
        background-color: #17a2b8;
        color: white;
        font-size: 14px;
      }
      .search-bar input {
        padding: 8px;
        width: 250px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .search-bar button {
        padding: 8px 15px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Quản Lý Sinh Viên</h1>

    <div class="header-actions">
      <a th:href="@{/students/add}" class="btn btn-primary">+ Thêm Mới</a>

      <form class="search-bar" th:action="@{/students}" method="get">
        <input
          type="text"
          name="keyword"
          th:value="${keyword}"
          placeholder="Tìm theo tên sinh viên..."
        />
        <button type="submit">Tìm kiếm</button>
        <a
          th:href="@{/students}"
          style="margin-left: 10px; text-decoration: none; color: #666"
          >Xóa lọc</a
        >
      </form>
    </div>

    <table>
      <thead>
        <tr>
          <th>MSSV (ID)</th>
          <th>Họ và Tên</th>
          <th>Email</th>
          <th>Tuổi</th>
          <th>Thao Tác</th>
        </tr>
      </thead>
      <tbody>
        <tr
          th:each="student : ${dsSinhVien}"
        >
          <td th:text="${student.id}"></td>
          <td th:text="${student.name}"></td>
          <td th:text="${student.email}"></td>
          <td>
            <span th:text="${student.age}"></span>
          </td>
          <td>
            <a
              th:href="@{/students/{id}(id=${student.id})}"
              class="btn btn-info"
              >Xem Chi Tiết</a
            >
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(dsSinhVien)}">
          <td colspan="5" style="text-align: center">
            Không có dữ liệu sinh viên.
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
